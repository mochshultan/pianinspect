<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC AUDIO RECORDING V6</title>
    <link rel="icon" href="../assets/yamaha-logo1.png" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Roboto+Mono:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        /* =========================================================
       P-32E QC AUDIO RECORDER V6 — INDUSTRIAL TELEMETRY
       ========================================================= */
        :root {
            --bg-main: #0a0a0a;
            --bg-topbar: #1c1c1c;
            --bg-deep: #050505;
            --surface-glass: #242424;
            --surface-solid: #2d2d2d;
            --surface-card: #181818;
            --surface-light: #262626;
            --accent-main: #FFC107;
            --accent-glow: #FFB300;
            --accent-dk: #F57F17;
            --success: #059669;
            --success-dk: #047857;
            --success-bd: #10B981;
            --warning: #D97706;
            --warning-dk: #B45309;
            --danger: #DC2626;
            --danger-dk: #B91C1C;
            --danger-bd: #ff2b2b;
            --text-main: #FFFFFF;
            --text-dim: #D1D5DB;
            --text-muted: #b2bbca;
            --text-inverse: #111827;
            --text-white: #FFFFFF;
            --border-main: #404040;
            --radius: 12px;
            --radius-sm: 6px;
            --shadow-main: 4px 4px 0px rgba(0, 0, 0, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 2px, transparent 2px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        #app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* TOPBAR */
        .topbar {
            background: var(--bg-topbar);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--border-main);
            box-shadow: 0 4px 0px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .topbar-left {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: nowrap;
            min-height: 2.6rem;
        }

        .topbar-right {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 0.5rem;
            flex-wrap: nowrap;
            min-height: 2.6rem;
        }

        .topbar h1 {
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: clamp(0.7rem, 1.8vw, 0.9rem);
            font-weight: 700;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            border-left: 2px solid var(--border-main);
            padding-left: 0.75rem;
        }

        /* LAYOUT */
        .middle-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: auto auto;
            gap: 1.2rem;
            padding: 1.2rem;
            flex: 1;
            align-content: start;
            min-height: 0;
        }

        .box-io {
            grid-column: 1;
            grid-row: 1;
            height: fit-content;
        }

        .box-record {
            grid-column: 1;
            grid-row: 2;
            display: flex;
            flex-direction: column;
        }

        .box-viz {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            min-height: 250px;
        }

        .box-files-wrapper {
            grid-column: 2;
            grid-row: 2;
            position: relative;
        }

        .box-files {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* BOXES */
        .control-box {
            display: flex;
            flex-direction: column;

            background: var(--surface-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-main);
            border: 2px solid var(--border-main);
            padding: 1.2rem;
        }

        .box-header {
            font-size: 0.8rem;
            font-weight: 900;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-main);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        /* FORMS & SELECTS */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        select,
        input[type="text"] {
            background: var(--surface-light);
            color: var(--text-main);
            border: 2px solid var(--border-main);
            padding: 0.6rem;
            border-radius: var(--radius-sm);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            outline: none;
            width: 100%;
        }

        select:focus {
            border-color: var(--accent-main);
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* STATUS & METRICS */
        .status-monitor {
            display: flex;
            text-align: center;
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--bg-main);
            border: 2px solid var(--border-main);
            min-height: 135px;
            border-radius: var(--radius-sm);
            flex-direction: column;
            justify-content: center;
        }

        #lbl-ovr {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0.10em;
        }

        #timer-display {
            font-family: 'Roboto Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-dim);
        }

        .status-monitor.recording {
            background: var(--danger-dk);
            border-color: var(--danger-bd);
            box-shadow: inset 0 0 20px rgba(220, 38, 38, 0.4);
        }

        .status-monitor.recording #lbl-ovr,
        .status-monitor.recording #timer-display {
            color: var(--text-white);
        }

        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .telemetry-item {
            background: var(--surface-light);
            padding: 0.8rem;
            border: 1px solid var(--border-main);
            border-radius: var(--radius-sm);
            text-align: center;
        }

        .tel-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .tel-val {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-main);
        }

        .tel-val.clip {
            color: var(--danger-bd);
        }

        /* BUTTONS */
        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 1.5rem;
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: center;
            transition: all 0.1s ease;
            box-shadow: 3px 3px 0px #000;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        .btn:active:not(:disabled) {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #000;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .btn-green {
            background: var(--success);
            border-color: var(--success-dk);
            color: var(--text-white);
        }

        .btn-red {
            background: var(--danger);
            border-color: var(--danger-dk);
            color: var(--text-white);
        }

        .btn-amber {
            background: var(--accent-main);
            border-color: var(--accent-dk);
            color: var(--text-inverse);
        }

        /* VISUALIZER */
        .canvas-container {
            background: var(--surface-light);
            border-radius: var(--radius-sm);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            border: 2px solid var(--border-main);
            position: relative;
            overflow: hidden;
            height: 712px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* MODAL & TABLE */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-container {
            background: var(--surface-card);
            border: 2px solid var(--border-main);
            border-radius: var(--radius);
            width: 850px;
            max-width: 90vw;
            box-shadow: var(--shadow-main);
            padding: 1.5rem;
        }

        .modal-header {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--accent-main);
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-main);
            padding-bottom: 0.5rem;
        }

        .modal-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .modal-row>div {
            flex: 1;
        }

        .tuts-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 0.5rem;
        }

        .tuts-btn {
            background: var(--surface-light);
            color: var(--text-main);
            border: 2px solid var(--border-main);
            border-radius: var(--radius-sm);
            padding: 0.5rem 0.5rem;
            font-size: 0.9rem;
            font-weight: 800;
            font-family: 'Roboto Mono', monospace;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s ease;
        }

        .tuts-btn:hover {
            border-color: var(--accent-main);
            color: var(--accent-main);
            transform: translateY(-2px);
        }

        .tuts-btn.extra {
            background: var(--bg-topbar);
            border-color: var(--warning);
            color: var(--warning);
        }

        .file-table-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            /* Added for mobile responsiveness */
            border: 2px solid var(--border-main);
            border-radius: var(--radius-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border-main);
            font-size: 0.8rem;
        }

        th {
            position: sticky;
            top: 0;
            background: var(--surface-light);
            font-weight: 800;
            color: var(--text-dim);
        }

        tr:hover {
            background: var(--surface-light);
        }

        .btn-play {
            background: var(--success);
            color: white;
            border: none;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-play:hover {
            background: var(--success-dk);
        }

        .btn-play.playing {
            background: var(--warning);
            color: var(--text-inverse);
        }

        /* --- RESPONSIVE MOBILE & IOS --- */
        @media (max-width: 992px) {
            .middle-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto auto;
                height: auto;
            }

            .box-io {
                grid-column: 1;
                grid-row: 1;
            }

            .box-viz {
                grid-column: 1;
                grid-row: 2;
                min-height: 350px;
            }

            .box-record {
                grid-column: 1;
                grid-row: 3;
            }

            .box-files-wrapper {
                grid-column: 1;
                grid-row: 4;
                min-height: 400px;
            }

            .topbar {
                padding: 1rem;
            }
        }

        @media (max-width: 768px) {
            .topbar {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                padding: 1rem;
            }

            .topbar-right {
                flex-wrap: wrap;
                justify-content: center;
            }

            .tuts-grid {
                grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            }

            .modal-row {
                flex-direction: column;
            }

            .box-viz {
                min-height: 250px;
            }

            .box-files-wrapper {
                min-height: 350px;
            }

            .telemetry-grid {
                grid-template-columns: 1fr;
            }

            .btn {
                font-size: 0.8rem;
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            .tuts-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .status-monitor {
                min-height: 100px;
                padding: 0.5rem;
            }

            #timer-display {
                font-size: 2rem;
            }

            .middle-layout {
                padding: 0.8rem;
                gap: 0.8rem;
            }

            .control-box {
                padding: 0.8rem;
            }

            .topbar-left {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div id="app">
        <header class="topbar">
            <div class="topbar-left">
                <h1>QC</h1><span class="subtitle">RAW MEASUREMENT RECORDER</span>
            </div>
            <div class="topbar-right" style="align-items: center; gap: 1rem;">
                <div
                    style="font-family: monospace; font-size: clamp(0.7rem, 1.8vw, 0.9rem); color: var(--accent-main); font-weight: 700; letter-spacing: 0.10em; display: flex; align-items: center;">
                    P32E Series
                </div>
                <button class="btn"
                    style="padding: 0 1.4rem; font-size: clamp(0.72rem, 1.5vw, 0.88rem); width: auto; margin-bottom: 0; background: var(--surface-light); color: var(--text-main); border-color: var(--border-main); display: flex; align-items: center; justify-content: center; min-height: 2.6rem;"
                    onclick="window.location.href='index_v4.html'">HOME</button>
            </div>
        </header>

        <main class="middle-layout">
            <div class="control-box box-io">
                <div class="box-header">I/O CONFIGURATION</div>
                <button id="btn-init-devices" class="btn btn-amber"
                    style="padding: 0.5rem; font-size: 0.75rem; margin-bottom: 1rem;">1. REFRESH DEVICES</button>
                <div class="form-group">
                    <label>Input Device (Mic)</label>
                    <select id="sel-device">
                        <option value="">-- Click Refresh First --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Target Sampling Rate</label>
                    <select id="sel-sample-rate">
                        <option value="44100">44,100 Hz</option>
                        <option value="48000" selected>48,000 Hz</option>
                        <option value="96000">96,000 Hz</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>DSP Mode</label>
                    <select id="sel-dsp">
                        <option value="raw" selected>Raw Measurement</option>
                        <option value="browser">Browser Default</option>
                    </select>
                </div>
            </div>

            <div class="control-box box-viz">
                <div class="box-header">LIVE OSCILLOSCOPE</div>
                <div class="canvas-container" style="flex: 1; height: auto;">
                    <canvas id="visualizer"></canvas>
                </div>
            </div>

            <div class="control-box box-record">
                <div class="box-header">RECORDING CONTROL</div>
                <div class="status-monitor" id="status-box">
                    <div id="lbl-ovr">STANDBY</div>
                    <div id="timer-display">00:00.0</div>
                </div>
                <div class="telemetry-grid">
                    <div class="telemetry-item">
                        <div class="tel-label">PEAK LEVEL</div>
                        <div class="tel-val" id="val-peak">-∞ dB</div>
                    </div>
                    <div class="telemetry-item">
                        <div class="tel-label">RMS LEVEL</div>
                        <div class="tel-val" id="val-rms">-∞ dB</div>
                    </div>
                </div>
                <button class="btn btn-green" id="btn-start" disabled>RECORD</button>
                <button class="btn btn-red" id="btn-stop" disabled style="display:none;">STOP CAPTURE</button>
                <button class="btn btn-amber" id="btn-download" disabled style="margin-bottom: 0;">EXPORT .WAV</button>
            </div>

            <div class="box-files-wrapper">
                <div class="control-box box-files">
                    <div class="box-header"
                        style="display: flex; justify-content: space-between; align-items: center; border-bottom: none; margin-bottom: 0;">
                        <span>AUDIO FILES</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-amber" id="btn-el3"
                                style="padding: 0.3rem 0.8rem; font-size: 0.7rem; width: auto; margin-bottom: 0;">EL
                                3</button>
                            <button class="btn" id="btn-el4"
                                style="padding: 0.3rem 0.8rem; font-size: 0.7rem; width: auto; margin-bottom: 0; background: var(--surface-light); color: var(--text-main); border-color: var(--border-main);">EL
                                4</button>
                        </div>
                    </div>
                    <div class="file-table-wrapper" style="margin-top: 0.5rem;">
                        <table>
                            <thead>
                                <tr>
                                    <th>FILENAME</th>
                                    <th style="width: 70px; text-align: center;">DUR</th>
                                    <th style="width: 80px; text-align: center;">ACTION</th>
                                </tr>
                            </thead>
                            <tbody id="file-list-body">
                                <tr>
                                    <td colspan="3" style="text-align: center; color: var(--text-dim);">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div class="modal-overlay" id="save-modal">
            <div class="modal-container">
                <div class="modal-header">SAVE WAV CONFIGURATION</div>
                <div class="modal-row">
                    <div class="form-group">
                        <label>Folder (Target)</label>
                        <select id="modal-folder">
                            <option value="el3">EL 3</option>
                            <option value="el4">EL 4</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Lot Number</label>
                        <div style="display: flex; gap: 0.5rem; align-items: stretch;">
                            <input type="text" id="modal-lot" placeholder="e.g. L01" value="L01" style="flex: 1;">
                            <button id="btn-lot-down" class="btn"
                                style="width: auto; padding: 0 1rem; margin: 0; background: var(--surface-light); color: var(--text-main); border-color: var(--border-main);">&minus;</button>
                            <button id="btn-lot-up" class="btn"
                                style="width: auto; padding: 0 1rem; margin: 0; background: var(--surface-light); color: var(--text-main); border-color: var(--border-main);">+</button>
                        </div>
                    </div>
                </div>
                <div class="form-group"><label>Select Tuts / Key to Save</label></div>
                <div class="tuts-grid" id="modal-tuts-grid"></div>
                <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end;">
                    <button class="btn" id="btn-close-modal"
                        style="width: auto; padding: 0.5rem 1.5rem; background: var(--surface-light); color: var(--text-main); border-color: var(--border-main);">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- UI Elements ---
        const btnInit = document.getElementById('btn-init-devices');
        const selDevice = document.getElementById('sel-device');
        const selSampleRate = document.getElementById('sel-sample-rate');
        const selDsp = document.getElementById('sel-dsp');
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnDownload = document.getElementById('btn-download');

        const statusBox = document.getElementById('status-box');
        const lblOvr = document.getElementById('lbl-ovr');
        const timerDisplay = document.getElementById('timer-display');
        const valPeak = document.getElementById('val-peak');
        const valRms = document.getElementById('val-rms');

        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        // --- State Variables ---
        let audioContext;
        let mediaStream;
        let workletNode;
        let analyserNode;
        let audioChunks = []; // Raw Float32 PCM
        let isRecording = false;
        let startTime;
        let timerInterval;
        let animationId;
        let finalWavUrl = null;
        let visualizerDataArray = new Float32Array(512);

        // --- Responsive Canvas ---
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- Utility: Linear to Decibel ---
        function linearToDb(linear) {
            if (linear <= 0.00001) return -100; // Floor at -100dB
            return 20 * Math.log10(linear);
        }

        // --- 1. Request Devices ---
        async function loadAudioDevices(isManual = false) {
            try {
                // Request initial permission to get device labels (Crucial step)
                const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                tempStream.getTracks().forEach(track => track.stop()); // close temp

                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioInputs = devices.filter(d => d.kind === 'audioinput');

                selDevice.innerHTML = '';
                const savedDeviceId = localStorage.getItem('qc_audio_device_id');

                audioInputs.forEach(device => {
                    const opt = document.createElement('option');
                    opt.value = device.deviceId;
                    opt.textContent = device.label || `Microphone ${selDevice.length + 1}`;

                    // Auto-select based on saved device or default to Focusrite
                    if (savedDeviceId && device.deviceId === savedDeviceId) {
                        opt.selected = true;
                    } else if (!savedDeviceId && (opt.textContent.toLowerCase().includes('focusrite') || opt.textContent.toLowerCase().includes('scarlett'))) {
                        opt.selected = true;
                    }
                    selDevice.appendChild(opt);
                });

                btnInit.textContent = "DEVICES LOADED";
                btnInit.disabled = true;
                btnStart.disabled = false;

            } catch (err) {
                console.error(err);
                if (isManual) {
                    alert('Gagal mendeteksi perangkat. Pastikan server lokal berjalan dan izin Microphone diberikan.');
                } else {
                    console.log('Auto-load perangkat gagal (mungkin butuh interaksi). Silakan klik tombol REFRESH DEVICES.');
                }
            }
        }

        btnInit.addEventListener('click', () => loadAudioDevices(true));

        selDevice.addEventListener('change', () => {
            localStorage.setItem('qc_audio_device_id', selDevice.value);
        });

        // Initialize devices automatically on load
        window.addEventListener('load', () => loadAudioDevices(false));

        // --- 2. Start Recording (With AudioWorklet) ---
        btnStart.addEventListener('click', async () => {
            btnStart.disabled = true;
            try {
                const deviceId = selDevice.value;
                const targetRate = parseInt(selSampleRate.value);
                const isRaw = selDsp.value === 'raw';

                // Set constraints robustly
                const constraints = {
                    audio: {
                        deviceId: deviceId ? { exact: deviceId } : undefined,
                        sampleRate: targetRate,
                        channelCount: 1,
                        // Bypass processing if RAW
                        echoCancellation: !isRaw,
                        noiseSuppression: !isRaw,
                        autoGainControl: !isRaw
                    }
                };

                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: targetRate });
                const source = audioContext.createMediaStreamSource(mediaStream);

                // CREATE INLINE AUDIOWORKLET (No external files needed)
                const workletCode = `
          class RecordProcessor extends AudioWorkletProcessor {
            process(inputs, outputs, parameters) {
              const input = inputs[0];
              if (input && input.length > 0 && input[0]) {
                const numChannels = input.length;
                const frameCount = input[0].length;
                const channelData = new Float32Array(frameCount);
                
                for (let i = 0; i < frameCount; i++) {
                    let sum = 0;
                    for (let c = 0; c < numChannels; c++) {
                        if (input[c]) sum += input[c][i];
                    }
                    if (sum > 1.0) sum = 1.0;
                    else if (sum < -1.0) sum = -1.0;
                    channelData[i] = sum;
                }
                
                // Calculate Telemetry inside worklet
                let sumSquare = 0;
                let peak = 0;
                for(let i=0; i<frameCount; i++) {
                  let val = channelData[i];
                  sumSquare += val * val;
                  if(Math.abs(val) > peak) peak = Math.abs(val);
                }
                let rms = Math.sqrt(sumSquare / frameCount);
                
                // Send raw array buffer and telemetry
                this.port.postMessage({
                  audio: channelData,
                  rms: rms,
                  peak: peak
                });
              }
              return true;
            }
          }
          registerProcessor('record-processor', RecordProcessor);
        `;

                const blob = new Blob([workletCode], { type: 'application/javascript' });
                const workletUrl = URL.createObjectURL(blob);

                await audioContext.audioWorklet.addModule(workletUrl);
                workletNode = new AudioWorkletNode(audioContext, 'record-processor');

                audioChunks = [];

                // Handle Messages from Worklet
                workletNode.port.onmessage = (e) => {
                    if (!isRecording) return;
                    audioChunks.push(e.data.audio);

                    // Update Telemetry Display
                    const peakDb = linearToDb(e.data.peak).toFixed(1);
                    const rmsDb = linearToDb(e.data.rms).toFixed(1);

                    valPeak.textContent = `${peakDb} dB`;
                    valRms.textContent = `${rmsDb} dB`;

                    // Clip warning
                    if (e.data.peak >= 0.98) valPeak.classList.add('clip');
                    else valPeak.classList.remove('clip');
                };

                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 512;
                visualizerDataArray = new Float32Array(analyserNode.fftSize);

                // Connect graph
                source.connect(analyserNode);
                source.connect(workletNode);
                workletNode.connect(audioContext.destination);

                // UI Updates
                isRecording = true;
                startTime = Date.now();
                timerInterval = setInterval(updateTimer, 100);

                selDevice.disabled = true;
                selSampleRate.disabled = true;
                selDsp.disabled = true;
                btnStart.style.display = 'none';
                btnStop.style.display = 'block';
                btnStop.disabled = false;
                btnDownload.disabled = true;

                statusBox.classList.add('recording');
                lblOvr.textContent = 'REC ACTIVE';

                drawVisualizer();

            } catch (err) {
                console.error(err);
                alert('Gagal memulai audio stream. Pastikan hardware tidak sedang digunakan aplikasi lain.');
                btnStart.disabled = false;
            }
        });

        // --- 3. Stop Recording ---
        btnStop.addEventListener('click', () => {
            isRecording = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(animationId);

            // Clean up Audio Graph
            if (workletNode) workletNode.disconnect();
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioContext) audioContext.close();

            // Reset Telemetry display
            valPeak.classList.remove('clip');

            // UI Update
            selDevice.disabled = false;
            selSampleRate.disabled = false;
            selDsp.disabled = false;
            btnStop.style.display = 'none';
            btnStart.style.display = 'block';
            btnStart.textContent = "RE-RECORD";
            btnStart.disabled = false;

            statusBox.classList.remove('recording');
            lblOvr.innerText = 'STANDBY \n (READY EXPORT)';

            processAudioToWav();
        });

        // --- Timer UI ---
        function updateTimer() {
            if (!isRecording) return;
            const diff = Date.now() - startTime;
            const mins = Math.floor(diff / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            const ms = Math.floor((diff % 1000) / 100);
            timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms}`;
        }

        // --- Visualizer Drawing (Oscilloscope Style) ---
        let isPlaybackVisualizing = false;

        function drawVisualizer() {
            if (!isRecording) return;
            animationId = requestAnimationFrame(drawVisualizer);
            drawVisualizerCore(analyserNode, true);
        }

        function drawPlaybackVisualizer() {
            if (!isPlaybackVisualizing) {
                // reset canvas
                canvasCtx.fillStyle = '#262626';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                canvasCtx.strokeStyle = '#404040';
                canvasCtx.beginPath();
                canvasCtx.moveTo(0, canvas.height / 2); canvasCtx.lineTo(canvas.width, canvas.height / 2);
                canvasCtx.stroke();
                return;
            }
            requestAnimationFrame(drawPlaybackVisualizer);
            drawVisualizerCore(playbackAnalyser, false);
        }

        function drawVisualizerCore(analyser, isRec) {
            canvasCtx.fillStyle = '#262626'; // var(--surface-light)
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid
            canvasCtx.strokeStyle = '#404040'; // var(--border-main)
            canvasCtx.lineWidth = 1;
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, canvas.height / 2); canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();

            if (analyser) {
                analyser.getFloatTimeDomainData(visualizerDataArray);
            }

            if (visualizerDataArray.length > 0) {
                canvasCtx.lineWidth = 2;
                canvasCtx.strokeStyle = isRec ? '#FFC107' : '#10B981'; // var(--accent-main) or green
                canvasCtx.beginPath();

                const sliceWidth = canvas.width * 1.0 / visualizerDataArray.length;
                let x = 0;

                // Boost visual amplitude for quiet raw signals
                const visualGain = 5.0;

                for (let i = 0; i < visualizerDataArray.length; i++) {
                    let v = visualizerDataArray[i] * visualGain;
                    if (v > 1) v = 1;
                    if (v < -1) v = -1;

                    const y = (v * -1 + 1) / 2 * canvas.height; // Invert so positive is up

                    if (i === 0) canvasCtx.moveTo(x, y);
                    else canvasCtx.lineTo(x, y);
                    x += sliceWidth;
                }
                canvasCtx.stroke();
            }
        }

        // --- WAV Processing & Export ---
        function processAudioToWav() {
            let totalLength = 0;
            for (let i = 0; i < audioChunks.length; i++) totalLength += audioChunks[i].length;

            let result = new Float32Array(totalLength);
            let offset = 0;
            for (let i = 0; i < audioChunks.length; i++) {
                result.set(audioChunks[i], offset);
                offset += audioChunks[i].length;
            }

            const currentSampleRate = parseInt(selSampleRate.value);
            const wavBuffer = encodeWAV(result, currentSampleRate);
            const blob = new Blob([wavBuffer], { type: 'audio/wav' });

            if (finalWavUrl) URL.revokeObjectURL(finalWavUrl);
            finalWavUrl = URL.createObjectURL(blob);
            btnDownload.disabled = false;
        }

        // --- Modal & Download Logic ---
        const modal = document.getElementById('save-modal');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const tutsGrid = document.getElementById('modal-tuts-grid');
        const modalFolder = document.getElementById('modal-folder');
        const modalLot = document.getElementById('modal-lot');

        const KEY_NAMES = [
            "F", "F#", "G", "G#", "A", "A#", "B",
            "C'", "C#'", "D'", "D#'", "E'", "F'", "F#'", "G'", "G#'", "A'", "A#'", "B'",
            "C''", "C#''", "D''", "D#''", "E''", "F''", "F#''", "G''", "G#''", "A''", "A#''", "B''",
            "C'''"
        ];

        for (let i = 1; i <= 32; i++) {
            const btn = document.createElement('button');
            btn.className = 'tuts-btn';
            const label = `${KEY_NAMES[i - 1]}(${i})`;
            btn.textContent = label;
            btn.onclick = () => handleSaveWav(label);
            tutsGrid.appendChild(btn);
        }

        // Lot Up/Down Logic
        function changeLot(delta) {
            let val = modalLot.value;
            let match = val.match(/^([a-zA-Z]*)(\d+)$/);
            if (match) {
                let prefix = match[1];
                let numStr = match[2];
                let num = parseInt(numStr, 10) + delta;
                if (num < 0) num = 0;
                modalLot.value = prefix + num.toString().padStart(numStr.length, '0');
            } else if (!isNaN(parseInt(val, 10))) {
                let num = parseInt(val, 10) + delta;
                if (num < 0) num = 0;
                modalLot.value = num.toString().padStart(val.length, '0');
            }
        }
        document.getElementById('btn-lot-up').addEventListener('click', () => changeLot(1));
        document.getElementById('btn-lot-down').addEventListener('click', () => changeLot(-1));

        btnDownload.addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        btnCloseModal.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        async function handleSaveWav(tutsId) {
            const folder = modalFolder.value;
            const lot = modalLot.value.trim() || 'L00';
            const filename = `${folder}_key${tutsId}_${lot}.wav`;

            if (currentFolder === folder) {
                if (currentFiles.includes(filename)) {
                    if (!confirm(`File ${filename} already exists in ${folder.toUpperCase()}. Proceed to save and potentially overwrite?`)) {
                        return;
                    }
                }
            }

            // --- XAMPP / PHP AUTO-SAVE LOGIC ---
            try {
                const response = await fetch(finalWavUrl);
                const blob = await response.blob();

                // Kemas file beserta metadata-nya
                const formData = new FormData();
                formData.append('audio', blob, filename);
                formData.append('folder', folder); // 'el3' atau 'el4'
                formData.append('filename', filename);

                // Kirim ke script PHP di localhost
                const uploadRes = await fetch('upload.php', {
                    method: 'POST',
                    body: formData
                });

                if (uploadRes.ok) {
                    // Upload berhasil
                    modal.style.display = 'none';
                    setTimeout(() => loadFiles(currentFolder), 300); // refresh tabel secepatnya
                    return;
                } else {
                    console.error("PHP Error:", await uploadRes.text());
                    throw new Error("Server mengembalikan error");
                }
            } catch (err) {
                console.error('XAMPP Auto-save failed:', err);
                // Jika error, gunakan fallback
                alert("Auto-Save via PHP gagal. Pastikan URL web Anda berawalan http://localhost/\nMengalihkan ke Download manual...");
                fallbackDownload(filename);
            }

            function fallbackDownload(name) {
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = finalWavUrl;
                a.download = name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                modal.style.display = 'none';
                setTimeout(() => loadFiles(currentFolder), 1000);
            }
        }

        // --- File List & Playback Logic ---
        const btnEl3 = document.getElementById('btn-el3');
        const btnEl4 = document.getElementById('btn-el4');
        const fileListBody = document.getElementById('file-list-body');
        let currentFolder = 'el3';
        let currentFiles = [];
        let currentlyPlayingAudio = null;
        let currentlyPlayingBtn = null;

        async function loadFiles(folder) {
            currentFolder = folder;
            btnEl3.className = folder === 'el3' ? 'btn btn-amber' : 'btn';
            btnEl4.className = folder === 'el4' ? 'btn btn-amber' : 'btn';
            if (folder === 'el3') {
                btnEl3.style.background = ''; btnEl3.style.color = ''; btnEl3.style.borderColor = '';
                btnEl4.style.background = 'var(--surface-light)'; btnEl4.style.color = 'var(--text-main)'; btnEl4.style.borderColor = 'var(--border-main)';
            } else {
                btnEl4.style.background = ''; btnEl4.style.color = ''; btnEl4.style.borderColor = '';
                btnEl3.style.background = 'var(--surface-light)'; btnEl3.style.color = 'var(--text-main)'; btnEl3.style.borderColor = 'var(--border-main)';
            }

            fileListBody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: var(--text-dim);">Loading...</td></tr>';
            try {
                const response = await fetch(`../sample/${folder}/`);
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'));
                currentFiles = links.map(a => {
                    const href = decodeURIComponent(a.getAttribute('href'));
                    const parts = href.split('/');
                    return parts[parts.length - 1];
                }).filter(n => n.endsWith('.wav') || n.endsWith('.mp3'));

                renderFiles();
            } catch (e) {
                console.error(e);
                fileListBody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: var(--danger);">Failed to load files</td></tr>';
            }
        }

        let currentlyDurCell = null;
        let playbackInterval;
        let playbackCtx = null;
        let playbackAnalyser = null;

        function renderFiles() {
            fileListBody.innerHTML = '';
            if (currentFiles.length === 0) {
                fileListBody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-dim);">No files found</td></tr>';
                return;
            }
            currentFiles.forEach(file => {
                const tr = document.createElement('tr');
                const tdName = document.createElement('td');
                tdName.textContent = file;

                const tdDur = document.createElement('td');
                tdDur.style.textAlign = 'center';
                tdDur.style.fontFamily = 'monospace';
                tdDur.textContent = '--:--';

                const url = `../sample/${currentFolder}/${file}`;
                const tempAudio = new Audio(url);
                tempAudio.onloadedmetadata = () => {
                    const d = Math.floor(tempAudio.duration);
                    tdDur.textContent = `00:${d.toString().padStart(2, '0')}`;
                    tdDur.dataset.original = tdDur.textContent;
                };

                const tdAction = document.createElement('td');
                tdAction.style.textAlign = 'center';
                const playBtn = document.createElement('button');
                playBtn.className = 'btn-play';
                playBtn.textContent = 'PLAY';
                playBtn.onclick = () => playAudio(url, playBtn, tdDur);
                tdAction.appendChild(playBtn);

                tr.appendChild(tdName);
                tr.appendChild(tdDur);
                tr.appendChild(tdAction);
                fileListBody.appendChild(tr);
            });
        }

        function playAudio(url, btn, tdDur) {
            if (currentlyPlayingAudio) {
                currentlyPlayingAudio.pause();
                currentlyPlayingAudio.currentTime = 0;
                if (currentlyPlayingBtn) {
                    currentlyPlayingBtn.textContent = 'PLAY';
                    currentlyPlayingBtn.classList.remove('playing');
                }
                if (currentlyDurCell && currentlyDurCell.dataset.original) {
                    currentlyDurCell.textContent = currentlyDurCell.dataset.original;
                }
                clearInterval(playbackInterval);
                isPlaybackVisualizing = false;
            }
            if (currentlyPlayingBtn === btn) {
                currentlyPlayingBtn = null;
                currentlyPlayingAudio = null;
                currentlyDurCell = null;
                return;
            }

            currentlyPlayingAudio = new Audio(url);
            currentlyPlayingAudio.crossOrigin = "anonymous";
            currentlyPlayingBtn = btn;
            currentlyDurCell = tdDur;
            btn.textContent = 'STOP';
            btn.classList.add('playing');

            if (!playbackCtx) {
                playbackCtx = new (window.AudioContext || window.webkitAudioContext)();
                playbackAnalyser = playbackCtx.createAnalyser();
                playbackAnalyser.fftSize = 512;
                playbackAnalyser.connect(playbackCtx.destination);
            }
            if (playbackCtx.state === 'suspended') {
                playbackCtx.resume();
            }

            const source = playbackCtx.createMediaElementSource(currentlyPlayingAudio);
            source.connect(playbackAnalyser);

            isPlaybackVisualizing = true;
            drawPlaybackVisualizer();

            currentlyPlayingAudio.play().catch(e => {
                console.error("Playback error:", e);
                alert("Playback failed. Ensure browser permits audio.");
            });

            playbackInterval = setInterval(() => {
                const remain = Math.ceil(currentlyPlayingAudio.duration - currentlyPlayingAudio.currentTime);
                if (!isNaN(remain)) {
                    tdDur.textContent = `00:${remain.toString().padStart(2, '0')}`;
                }
            }, 100);

            currentlyPlayingAudio.onended = () => {
                btn.textContent = 'PLAY';
                btn.classList.remove('playing');
                if (tdDur.dataset.original) tdDur.textContent = tdDur.dataset.original;
                clearInterval(playbackInterval);
                isPlaybackVisualizing = false;
                currentlyPlayingAudio = null;
                currentlyPlayingBtn = null;
                currentlyDurCell = null;
            };
        }

        btnEl3.addEventListener('click', () => loadFiles('el3'));
        btnEl4.addEventListener('click', () => loadFiles('el4'));

        // Init load
        loadFiles('el3');

        // --- 32-Bit Float WAV Encoder (Studio Grade / HiFi) ---
        function encodeWAV(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 4);
            const view = new DataView(buffer);
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 4, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 3, true); // 3 = IEEE Float
            view.setUint16(22, 1, true); // 1 = Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 4, true); // Byte rate
            view.setUint16(32, 4, true); // Block align
            view.setUint16(34, 32, true); // 32-bit
            writeString(view, 36, 'data');
            view.setUint32(40, samples.length * 4, true);

            let offset = 44;
            for (let i = 0; i < samples.length; i++, offset += 4) {
                view.setFloat32(offset, samples[i], true);
            }
            return buffer;
        }

        // Initialize blank canvas state
        canvasCtx.fillStyle = '#262626'; // var(--surface-light)
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.strokeStyle = '#404040'; // var(--border-main)
        canvasCtx.beginPath();
        canvasCtx.moveTo(0, canvas.height / 2); canvasCtx.lineTo(canvas.width, canvas.height / 2);
        canvasCtx.stroke();
    </script>
</body>
